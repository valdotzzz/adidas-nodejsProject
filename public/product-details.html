<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas | Product Details</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/cart-store.js"></script>
    <script src="js/layout.js"></script>
</head>
<body>

    <section class="products-section" style="background-color: #000000; min-height: 80vh; padding-top: 40px;">
        <div class="adidas-hero" style="background-color: transparent; min-height: auto; grid-template-columns: 1.2fr 0.8fr; gap: 5%;">
            
            <div class="adidas-hero__image" style="background-color: #111111; min-height: 600px; border: 1px solid #1a1a1a;">
                <img id="detail-image" src="" alt="Product Image" style="object-fit: contain; padding: 40px;">
            </div>

            <div class="adidas-hero__content" style="padding: 0; display: flex; flex-direction: column; justify-content: flex-start;">
                <div class="adidas-hero__eyebrow" id="detail-category">Adidas Performance</div>
                <h1 class="adidas-hero__headline" id="detail-name" style="font-size: 40px; margin-bottom: 12px;">Loading...</h1>
                
                <div class="product-card__price" id="detail-price" style="font-size: 24px; font-weight: 700; margin-bottom: 24px;">₱0.00</div>
                
                <p class="adidas-hero__sub" id="detail-desc" style="margin-bottom: 32px; max-width: 100%;"></p>
                
               <div class="form-group" style="margin-bottom: 32px;">
                    <label style="margin-bottom: 12px;">Available Options / Style Code: <span id="detail-style-code" style="color:#fff;"></span></label>
                    <div style="display:flex; align-items:center; gap:8px; margin:12px 0 4px;">
    <span style="font-size:11px; color:#888; text-transform:uppercase; letter-spacing:1px;">Size Format:</span>
    <button type="button" class="size-unit-btn" data-unit="US" style="padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer;">US</button>
    <button type="button" class="size-unit-btn" data-unit="UK" style="padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer;">UK</button>
    <button type="button" class="size-unit-btn" data-unit="EU" style="padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer;">EU</button>
</div>
                    <div id="variant-container" style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px;">
                        </div>
                    <div class="field-error" id="variant-error" style="margin-top: 12px;">Please select an option before proceeding.</div>
                </div>

                <div class="form-group" style="margin-bottom: 32px;">
                    <label style="margin-bottom: 12px;">Quantity</label>
                    <div style="display:flex; align-items:center; width:fit-content; border:1.5px solid #444;">
                        <button type="button" id="qtyMinusBtn" class="btn btn-dark" style="padding:10px 16px; font-size:16px;">−</button>
                        <input type="number" id="qtyInput" value="1" min="1" readonly style="width:50px; text-align:center; border:none; background:#000; color:#fff; font-size:14px; font-weight:700;">
                        <button type="button" id="qtyPlusBtn" class="btn btn-dark" style="padding:10px 16px; font-size:16px;">+</button>
                    </div>
                </div>

                <div class="adidas-hero__actions" style="margin-top: 16px; display:flex; gap:12px;">
                    <button id="addToCartBtn" class="btn btn-primary" style="flex:1; height: 55px; letter-spacing: 2px;">Add to Cart</button>
                    <button id="wishlistToggleBtn" class="wishlist-heart-btn wishlist-heart-btn--pdp" title="Add to Wishlist">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 21s-7.5-4.6-10-9.3C.5 8 2 4.5 5.5 4a5.4 5.4 0 016.5 3 5.4 5.4 0 016.5-3C22 4.5 23.5 8 22 11.7 19.5 16.4 12 21 12 21z"></path>
                        </svg>
                    </button>
                </div>
                <div id="cart-feedback" style="margin-top: 12px; font-size: 13px; display:none;">

                </div>
            </div>

        </div>
    </section>
<section class="products-section" style="max-width: 900px; margin: 0 auto;">
        <div class="section-header">
            <div>
                <div class="section-label">Customer Feedback</div>
                <h2 class="section-title" style="font-size: 28px;">Reviews</h2>
            </div>
        </div>

        <div id="review-form-container" style="display:none; background:#111; border:1px solid #2a2a2a; padding:28px; margin-bottom:32px;">
            <form id="reviewForm">
                <div class="form-group" style="margin-bottom:20px;">
                    <label class="form-label" style="color:#fff; display:block; margin-bottom:10px; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Your Rating</label>
                    <select id="review-rating" class="form-control" required style="max-width:220px; background:#000; color:#fff; border:1px solid #333; padding:10px 12px; font-size:13px;">
                        <option value="">Select</option>
                        <option value="5">★★★★★ Excellent</option>
                        <option value="4">★★★★☆ Good</option>
                        <option value="3">★★★☆☆ Average</option>
                        <option value="2">★★☆☆☆ Poor</option>
                        <option value="1">★☆☆☆☆ Terrible</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:20px;">
                    <label class="form-label" style="color:#fff; display:block; margin-bottom:10px; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Your Review</label>
                    <textarea id="review-comment" class="form-control" rows="3" placeholder="Tell us what you think about this shoe..." style="width:100%; background:#000; color:#fff; border:1px solid #333; padding:12px; font-size:13px; resize:vertical;"></textarea>
                </div>
                <button type="submit" class="btn" style="background:#fff; color:#000; border:none; padding:13px 28px; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; cursor:pointer;">Submit Review</button>
            </form>
        </div>

        <div id="review-locked-message" style="display:none; background:#111; border:1px solid #2a2a2a; padding:20px 24px; margin-bottom:32px; font-size:13px; color:#888;">
            You can only review this product after purchasing it.
        </div>

        <div id="reviews-list"></div>
    </section>
    <script src="js/product-details.js"></script>
</body>
</html>
