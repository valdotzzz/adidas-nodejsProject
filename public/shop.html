<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adidas | Shop Collection</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/cart-store.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/search-autocomplete.js"></script>
</head>
<body>

    <section class="products-section">
        <div class="section-header">
            <div>
                <div class="section-label" id="catalog-label">Performance Catalog</div>
                <h2 class="section-title" id="catalog-title">All Shoes</h2>
            </div>
            
            <div class="adidas-hero__actions" style="gap: 8px;">
                <button class="btn btn-dark filter-btn active" data-category="all" style="padding: 8px 16px; font-size: 11px;">All</button>
                <button class="btn btn-dark filter-btn" data-category="running" style="padding: 8px 16px; font-size: 11px;">Running</button>
                <button class="btn btn-dark filter-btn" data-category="lifestyle" style="padding: 8px 16px; font-size: 11px;">Lifestyle</button>
                <button class="btn btn-dark filter-btn" data-category="basketball" style="padding: 8px 16px; font-size: 11px;">Basketball</button>
            </div>
        </div>

        <div class="products-grid" id="catalog-grid"></div>

        <!-- Numbered pagination controls -->
        <!-- <div id="catalog-pagination" style="display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:40px;"></div> -->

        <!-- Infinite scroll trigger (invisible sentinel div watched by scroll listener) -->
        <div id="load-more-trigger" style="display:none; height:1px;"></div>

        <!-- Spinner shown while next page loads -->
        <div id="load-more-spinner" style="display:none; text-align:center; padding:32px 0;">
            <div style="display:inline-block; width:28px; height:28px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite;"></div>
        </div>

        <!-- End-of-catalog message, revealed when all pages are loaded -->
        <div id="all-loaded-msg" style="display:none; text-align:center; padding:32px 0; color:#555; font-size:11px; text-transform:uppercase; letter-spacing:2px;">
            — End of Collection —
        </div>

        <style>
            @keyframes spin { to { transform: rotate(360deg); } }
        </style>

    <script src="js/shop.js"></script>
</body>
</html>
